<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💰 অ্যাড ভিউ আয় | Adsgram + Telegram Mini App</title>
    
    <!-- Telegram WebApp Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Adsgram SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            min-height: 100vh;
            padding: 20px;
            color: #f1f5f9;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* ব্যালেন্স কার্ড */
        .balance-card {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 32px;
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
        }

        .balance-label {
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .balance-amount {
            font-size: 48px;
            font-weight: 800;
            margin: 8px 0;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .per-view {
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }

        /* এড দেখার বাটন */
        .watch-ad-btn {
            background: linear-gradient(135deg, #ec489a, #be185d);
            border: none;
            width: 100%;
            padding: 22px;
            border-radius: 40px;
            color: white;
            font-size: 22px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 25px -5px rgba(236,72,153,0.4);
        }

        .watch-ad-btn:active {
            transform: scale(0.97);
        }

        .watch-ad-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* সেকেন্ডারি বাটন */
        .secondary-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: 0.2s;
        }

        .secondary-btn:active {
            background: rgba(255,255,255,0.2);
        }

        /* উইথড্র মডাল */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 32px;
            padding: 28px;
            width: 90%;
            max-width: 380px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .modal-content h3 {
            font-size: 24px;
            margin-bottom: 16px;
            text-align: center;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 60px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }

        .modal-content input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .confirm-btn {
            background: #10b981;
            color: white;
        }

        .cancel-btn {
            background: #ef4444;
            color: white;
        }

        /* ইতিহাস সেকশন */
        .history-section {
            background: rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 20px;
            margin-top: 24px;
            backdrop-filter: blur(10px);
        }

        .history-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }

        .pending {
            color: #fbbf24;
        }

        .approved {
            color: #10b981;
        }

        .rejected {
            color: #ef4444;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 16px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #ec489a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 1100;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .hidden {
            display: none;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 13px;
            color: #cbd5e1;
        }

        .badge {
            background: #f59e0b;
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 11px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div>🔞 লোড হচ্ছে...</div>
    </div>

    <div class="container hidden" id="mainContent">
        <!-- ব্যালেন্স কার্ড -->
        <div class="balance-card">
            <div class="balance-label">💰 আপনার মোট আয় (USD)</div>
            <div class="balance-amount" id="balanceAmount">0.0000</div>
            <div class="per-view">🎬 প্রতি অ্যাড ভিউ = $0.002</div>
        </div>

        <!-- প্রধান অ্যাড দেখার বাটন -->
        <button class="watch-ad-btn" id="watchRewardedBtn">
            ▶️ অ্যাড দেখে আয় করুন
        </button>

        <!-- ডেইলি বোনাস ও উইথড্র -->
        <button class="secondary-btn" id="dailyBonusBtn">
            🎁 ডেইলি বোনাস ($0.05)
        </button>
        <button class="secondary-btn" id="withdrawBtn" style="background:#10b981; border:none;">
            💸 উইথড্র করুন (ন্যূনতম $1.00)
        </button>

        <div class="stat-row">
            <span>📊 মোট অ্যাড ভিউ: <span id="totalViews">0</span></span>
            <span>⏱ কুলডাউন: <span id="cooldownTimer">প্রস্তুত</span></span>
        </div>

        <!-- পেন্ডিং উইথড্র -->
        <div class="history-section" style="margin-top: 16px;">
            <div class="history-title">
                ⏳ পেন্ডিং উইথড্র রিকোয়েস্ট
            </div>
            <div id="pendingWithdrawList">
                <div class="history-item">কোনো পেন্ডিং রিকোয়েস্ট নেই</div>
            </div>
        </div>

        <!-- ইতিহাস -->
        <div class="history-section">
            <div class="history-title">
                📜 লেনদেন ইতিহাস
            </div>
            <div class="history-list" id="historyList">
                <div class="history-item">✨ স্বাগতম! অ্যাড দেখে আয় শুরু করুন</div>
            </div>
        </div>

        <div style="text-align: center; font-size: 11px; margin-top: 20px; opacity:0.6;">
            Adsgram Powered • Telegram Mini App
        </div>
    </div>

    <!-- উইথড্র মডাল -->
    <div id="withdrawModal" class="modal hidden">
        <div class="modal-content">
            <h3>💸 উইথড্র করুন</h3>
            <p style="text-align: center; margin-bottom: 16px;">আপনার ব্যালেন্স: <strong id="modalBalance">$0.00</strong></p>
            <input type="text" id="withdrawAmount" placeholder="উইথড্র পরিমাণ (USD)" inputmode="decimal">
            <select id="paymentMethod">
                <option value="Bkash">বিকাশ (Bkash)</option>
                <option value="Nagad">নগদ (Nagad)</option>
                <option value="Rocket">রকেট (Rocket)</option>
                <option value="PayPal">PayPal</option>
            </select>
            <input type="text" id="paymentAccount" placeholder="পেমেন্ট অ্যাকাউন্ট নম্বর/ইমেইল">
            <div class="modal-buttons">
                <button class="confirm-btn" id="confirmWithdraw">কনফার্ম</button>
                <button class="cancel-btn" id="cancelWithdraw">বাতিল</button>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg hidden"></div>

    <script>
        // ======================== কনফিগারেশন ========================
        const REWARDED_BLOCK_ID = "int-27311";  // 👈 আপনার Adsgram Rewarded ব্লক আইডি দিন
        const AD_COOLDOWN_SECONDS = 30; // প্রতি অ্যাডের মধ্যে ৩০ সেকেন্ড কুলডাউন
        const MIN_WITHDRAW = 1.00;
        const AD_REWARD = 0.002;

        // ======================== ইউজার ডাটা ========================
        let userData = {
            balance: 0,
            totalViews: 0,
            history: [],
            withdrawRequests: [],  // { id, amount, method, account, status, date }
            lastAdTime: 0
        };

        // লোড এবং সেভ
        function loadUserData() {
            const saved = localStorage.getItem("adEarningApp_v2");
            if(saved) {
                try {
                    const parsed = JSON.parse(saved);
                    userData.balance = parsed.balance || 0;
                    userData.totalViews = parsed.totalViews || 0;
                    userData.history = parsed.history || [];
                    userData.withdrawRequests = parsed.withdrawRequests || [];
                    userData.lastAdTime = parsed.lastAdTime || 0;
                } catch(e) {}
            }
            updateUI();
            renderHistory();
            renderPendingWithdraws();
        }

        function saveUserData() {
            localStorage.setItem("adEarningApp_v2", JSON.stringify({
                balance: userData.balance,
                totalViews: userData.totalViews,
                history: userData.history.slice(0, 50),
                withdrawRequests: userData.withdrawRequests,
                lastAdTime: userData.lastAdTime
            }));
        }

        function addToHistory(text, amount = null, type = "earning") {
            const time = new Date().toLocaleString();
            let entry = { time, text, type };
            if(amount !== null) {
                entry.amount = amount;
                entry.text = `${text} +$${amount.toFixed(4)}`;
            }
            userData.history.unshift(entry);
            if(userData.history.length > 50) userData.history.pop();
            saveUserData();
            renderHistory();
        }

        // শুধুমাত্র অ্যাড সফলভাবে দেখলেই টাকা যোগ হবে
        function addEarning(amount, reason) {
            userData.balance += amount;
            userData.totalViews += 1;
            userData.balance = parseFloat(userData.balance.toFixed(6));
            saveUserData();
            updateUI();
            addToHistory(reason, amount, "earning");
            showToast(`✅ +$${amount.toFixed(4)} ${reason}`);
        }

        function updateUI() {
            document.getElementById("balanceAmount").innerText = userData.balance.toFixed(4);
            document.getElementById("totalViews").innerText = userData.totalViews;
        }

        function renderHistory() {
            const historyDiv = document.getElementById("historyList");
            if(userData.history.length === 0) {
                historyDiv.innerHTML = '<div class="history-item">কোনো লেনদেন নেই</div>';
                return;
            }
            historyDiv.innerHTML = userData.history.map(item => `
                <div class="history-item">
                    <span>${item.text}</span>
                    <span style="font-size:11px;">${item.time}</span>
                </div>
            `).join('');
        }

        function renderPendingWithdraws() {
            const pendingDiv = document.getElementById("pendingWithdrawList");
            const pending = userData.withdrawRequests.filter(r => r.status === "pending");
            if(pending.length === 0) {
                pendingDiv.innerHTML = '<div class="history-item">কোনো পেন্ডিং রিকোয়েস্ট নেই</div>';
                return;
            }
            pendingDiv.innerHTML = pending.map(req => `
                <div class="history-item">
                    <span>💰 $${req.amount.toFixed(2)} - ${req.method}</span>
                    <span class="pending">⏳ পেন্ডিং</span>
                </div>
            `).join('');
        }

        function showToast(msg) {
            const toast = document.getElementById("toastMsg");
            toast.innerText = msg;
            toast.classList.remove("hidden");
            setTimeout(() => {
                toast.classList.add("hidden");
            }, 3000);
        }

        // ======================== কুলডাউন চেক ========================
        function isCooldownActive() {
            const now = Date.now();
            const timeSinceLastAd = (now - userData.lastAdTime) / 1000;
            return timeSinceLastAd < AD_COOLDOWN_SECONDS;
        }

        function getRemainingCooldown() {
            const now = Date.now();
            const elapsed = (now - userData.lastAdTime) / 1000;
            const remaining = AD_COOLDOWN_SECONDS - elapsed;
            return remaining > 0 ? Math.ceil(remaining) : 0;
        }

        function updateCooldownTimer() {
            const timerElement = document.getElementById("cooldownTimer");
            if(isCooldownActive()) {
                const remaining = getRemainingCooldown();
                timerElement.innerHTML = `${remaining} সেকেন্ড বাকি`;
                timerElement.style.color = "#fbbf24";
            } else {
                timerElement.innerHTML = "✅ প্রস্তুত";
                timerElement.style.color = "#10b981";
            }
        }

        setInterval(updateCooldownTimer, 1000);

        // ======================== Adsgram অ্যাড (সফল হলেই টাকা) ========================
        function showRewardedAd() {
            return new Promise((resolve, reject) => {
                // কুলডাউন চেক
                if(isCooldownActive()) {
                    const remaining = getRemainingCooldown();
                    showToast(`⏱ অনুগ্রহ করে ${remaining} সেকেন্ড অপেক্ষা করুন`);
                    reject("Cooldown active");
                    return;
                }

                if(typeof Adsgram === "undefined") {
                    showToast("❌ Adsgram SDK লোড হয়নি");
                    reject("SDK not loaded");
                    return;
                }
                
                try {
                    const adController = Adsgram.init({ 
                        blockId: REWARDED_BLOCK_ID,
                        debug: true
                    });
                    
                    adController.show().then(() => {
                        console.log("✅ অ্যাড সম্পূর্ণ দেখেছে - টাকা যোগ করা হচ্ছে");
                        // ✅ অ্যাড সম্পূর্ণ দেখার পরই টাকা যোগ হবে
                        userData.lastAdTime = Date.now();
                        addEarning(AD_REWARD, "📺 রিওয়ার্ডেড অ্যাড ভিউ");
                        saveUserData();
                        resolve(true);
                    }).catch((error) => {
                        console.log("❌ অ্যাড দেখতে ব্যর্থ বা স্কিপ করেছে:", error);
                        // ❌ অ্যাড না দেখলে বা স্কিপ করলে টাকা যোগ হবে না
                        showToast("⚠️ অ্যাড সম্পূর্ণ দেখুন তবেই আয় পাবেন!");
                        reject(error);
                    });
                } catch(e) {
                    console.error("Adsgram init error:", e);
                    showToast("❌ অ্যাড লোড করতে সমস্যা হয়েছে");
                    reject(e);
                }
            });
        }

        // ======================== ডেইলি বোনাস ========================
        function claimDailyBonus() {
            const lastBonus = localStorage.getItem("lastBonusDate");
            const today = new Date().toDateString();
            if(lastBonus === today) {
                showToast("❌ আজকে বোনাস নেওয়া হয়েছে! কাল আবার আসুন।");
                return false;
            }
            userData.balance += 0.05;
            userData.balance = parseFloat(userData.balance.toFixed(6));
            saveUserData();
            updateUI();
            addToHistory("🎁 ডেইলি বোনাস", 0.05, "bonus");
            localStorage.setItem("lastBonusDate", today);
            showToast("🎁 +$0.05 ডেইলি বোনাস!");
            return true;
        }

        // ======================== এডভান্সড উইথড্র সিস্টেম ========================
        function openWithdrawModal() {
            if(userData.balance < MIN_WITHDRAW) {
                showToast(`ন্যূনতম উইথড্র $${MIN_WITHDRAW}। আপনার ব্যালেন্স: $${userData.balance.toFixed(4)}`);
                return;
            }
            document.getElementById("modalBalance").innerText = `$${userData.balance.toFixed(4)}`;
            document.getElementById("withdrawAmount").value = "";
            document.getElementById("paymentAccount").value = "";
            document.getElementById("withdrawModal").classList.remove("hidden");
        }

        function submitWithdrawRequest() {
            let amount = parseFloat(document.getElementById("withdrawAmount").value);
            const method = document.getElementById("paymentMethod").value;
            const account = document.getElementById("paymentAccount").value.trim();

            // ভ্যালিডেশন
            if(isNaN(amount) || amount <= 0) {
                showToast("সঠিক পরিমাণ লিখুন");
                return;
            }
            if(amount < MIN_WITHDRAW) {
                showToast(`ন্যূনতম উইথড্র $${MIN_WITHDRAW}`);
                return;
            }
            if(amount > userData.balance) {
                showToast("ব্যালেন্সের চেয়ে বেশি উইথড্র করতে পারবেন না");
                return;
            }
            if(account === "") {
                showToast("পেমেন্ট অ্যাকাউন্ট দিন");
                return;
            }

            // উইথড্র রিকোয়েস্ট তৈরি
            const requestId = "WD_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
            const newRequest = {
                id: requestId,
                amount: amount,
                method: method,
                account: account,
                status: "pending",
                date: new Date().toISOString()
            };

            userData.withdrawRequests.push(newRequest);
            userData.balance -= amount;
            userData.balance = parseFloat(userData.balance.toFixed(6));
            saveUserData();
            updateUI();
            addToHistory(`💸 উইথড্র রিকোয়েস্ট: $${amount.toFixed(2)} (${method}) - পেন্ডিং`, amount, "withdraw");
            renderPendingWithdraws();

            // মডাল বন্ধ
            document.getElementById("withdrawModal").classList.add("hidden");
            showToast(`✅ $${amount.toFixed(2)} উইথড্র রিকোয়েস্ট পাঠানো হয়েছে! অ্যাডমিন অ্যাপ্রুভ করবে।`);

            // টেলিগ্রাম নোটিফিকেশন (যদি মিনি অ্যাপে থাকে)
            if(window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.showAlert(`$${amount.toFixed(2)} উইথড্র রিকোয়েস্ট গৃহীত হয়েছে!`);
            }

            // অ্যাডমিনের জন্য কনসোলে লগ (প্রোডাকশনে ব্যাকএন্ডে পাঠানো ভালো)
            console.log("🔔 নতুন উইথড্র রিকোয়েস্ট:", newRequest);
        }

        // অ্যাডমিন ফাংশন (উইথড্র অ্যাপ্রুভ/রিজেক্ট - ডেমোর জন্য কনসোলে)
        // রিয়েল প্রজেক্টে এগুলো ব্যাকএন্ড API দিয়ে করবেন
        window.approveWithdraw = function(requestId) {
            const request = userData.withdrawRequests.find(r => r.id === requestId);
            if(request && request.status === "pending") {
                request.status = "approved";
                saveUserData();
                addToHistory(`✅ উইথড্র অনুমোদিত: $${request.amount.toFixed(2)}`, null, "withdraw");
                renderPendingWithdraws();
                renderHistory();
                console.log(`✅ Withdraw ${requestId} approved`);
            }
        };

        window.rejectWithdraw = function(requestId) {
            const request = userData.withdrawRequests.find(r => r.id === requestId);
            if(request && request.status === "pending") {
                request.status = "rejected";
                // ব্যালেন্স ফেরত দিন
                userData.balance += request.amount;
                userData.balance = parseFloat(userData.balance.toFixed(6));
                saveUserData();
                updateUI();
                addToHistory(`❌ উইথড্র বাতিল: $${request.amount.toFixed(2)} (ব্যালেন্স ফেরত)`, null, "withdraw");
                renderPendingWithdraws();
                renderHistory();
                console.log(`❌ Withdraw ${requestId} rejected`);
            }
        };

        // ======================== টেলিগ্রাম ও লোডিং ========================
        function initTelegramApp() {
            if(window.Telegram && Telegram.WebApp) {
                const webApp = Telegram.WebApp;
                webApp.ready();
                webApp.expand();
                webApp.setHeaderColor("bg_color");
                webApp.setBackgroundColor("#0f172a");
            }
        }

        // অনলাইন কাউন্ট
        function updateOnlineCount() {
            const randomOnline = Math.floor(Math.random() * 300) + 80;
            const onlineElem = document.getElementById("onlineCount");
            if(onlineElem) onlineElem.innerText = randomOnline;
        }
        setInterval(updateOnlineCount, 8000);
        
        // ======================== ইভেন্ট লিসেনার ========================
        async function onWatchRewarded() {
            const btn = document.getElementById("watchRewardedBtn");
            btn.disabled = true;
            btn.innerText = "⏳ অ্যাড লোড হচ্ছে...";
            
            try {
                await showRewardedAd();
            } catch(e) {
                console.log("Ad failed", e);
                // টাকা যোগ হবে না - আগেই handled
            } finally {
                btn.disabled = false;
                btn.innerText = "▶️ অ্যাড দেখে আয় করুন";
                updateCooldownTimer();
            }
        }

        // পেজ লোড
        window.addEventListener("load", async () => {
            loadUserData();
            initTelegramApp();
            updateOnlineCount();
            
            setTimeout(() => {
                document.getElementById("loadingOverlay").style.display = "none";
                document.getElementById("mainContent").classList.remove("hidden");
            }, 800);
            
            document.getElementById("watchRewardedBtn").addEventListener("click", onWatchRewarded);
            document.getElementById("dailyBonusBtn").addEventListener("click", claimDailyBonus);
            document.getElementById("withdrawBtn").addEventListener("click", openWithdrawModal);
            document.getElementById("confirmWithdraw").addEventListener("click", submitWithdrawRequest);
            document.getElementById("cancelWithdraw").addEventListener("click", () => {
                document.getElementById("withdrawModal").classList.add("hidden");
            });
            
            // মডালের বাইরে ক্লিক করলে বন্ধ
            document.getElementById("withdrawModal").addEventListener("click", (e) => {
                if(e.target === document.getElementById("withdrawModal")) {
                    document.getElementById("withdrawModal").classList.add("hidden");
                }
            });
        });
        
        console.log("✅ অ্যাডসগ্রাম সিস্টেম: অ্যাড সম্পূর্ণ দেখলেই টাকা যাবে");
        console.log("✅ উইথড্র সিস্টেম: পেন্ডিং রিকোয়েস্ট, অ্যাডমিন কনসোলে approveWithdraw() / rejectWithdraw() ব্যবহার করবেন");
    </script>
</body>
</html>
